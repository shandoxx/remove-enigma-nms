[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
timeout = 30
interpreter_python = auto_silent

[persistent_connection]
command_timeout = 60
connect_timeout = 30

[paramiko_connection]
look_for_keys = False
host_key_auto_add = True
record_host_keys = False
